services:
  test-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: battleship_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      test-postgres:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@test-postgres:5432/battleship_test
      ADMIN_TOKEN: e2e-test-admin
    command: >
      sh -c "python app/scripts/init_test_db.py && python -m app.main"

  test-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    depends_on:
      test-app:
        condition: service_started
    environment:
      APP_URL: http://test-app:8000
    volumes:
      - ./test-results:/app/test-results
    command: >
      sh -c "sleep 3 && pytest tests_e2e/ -v --video=on --output=test-results"
