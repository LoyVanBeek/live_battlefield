<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Battlefield - Super Admin Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #16213e;
            padding: 40px;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #00d9ff; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 20px; }
        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #eee;
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
        }
        input:focus { outline: none; border-color: #00d9ff; }
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background: #00d9ff;
            color: #1a1a2e;
            width: 100%;
        }
        .btn:hover { background: #00b8d4; }
        .error { color: #f44336; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Super Admin</h1>
        <p>Enter your super admin token to manage games</p>
        <input type="text" id="token" placeholder="Paste token here..." autofocus>
        <button class="btn" onclick="login()">Login</button>
        <div class="error" id="error">Invalid token</div>
    </div>
    <script>
        function login() {
            const token = document.getElementById('token').value.trim();
            if (!token) return;
            window.location.href = '/admin/' + encodeURIComponent(token);
        }
        document.getElementById('token').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
