<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tr.page.title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { text-align: center; margin-bottom: 20px; color: #00d9ff; }
        h2 { color: #00d9ff; margin-bottom: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: #00d9ff; color: #1a1a2e; }
        .btn-primary:hover:not(:disabled) { background: #00b8d4; }
        .btn-success { background: #4caf50; color: white; }
        .btn-success:hover:not(:disabled) { background: #45a049; }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover:not(:disabled) { background: #da190b; }
        
        .nav-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #16213e;
            color: #00d9ff;
            text-decoration: none;
            border-radius: 5px;
        }
        .nav-link:hover { background: #0f3460; }

        /* Team Header */
        .team-header {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .team-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .team-color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .team-name { font-size: 24px; font-weight: bold; }
        .team-status-badge {
            font-size: 13px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .team-status-badge.started { background: #4caf50; color: white; }
        .team-status-badge.waiting { background: #ff9800; color: white; }
        .team-status-badge.ended { background: #f44336; color: white; }
        .team-stats {
            display: flex;
            gap: 20px;
            font-size: 18px;
        }
        .team-stats span { display: flex; align-items: center; gap: 5px; }
        .team-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }
        .lang-select {
            padding: 6px 10px;
            font-size: 14px;
            border: 2px solid #0f3460;
            border-radius: 5px;
            background: #1a1a2e;
            color: #eee;
            cursor: pointer;
        }
        .lang-select:focus { outline: none; border-color: #00d9ff; }
        .bomb-count-ok { color: #4caf50; }
        .bomb-count-low { color: #ff9800; }
        .bomb-count-empty { color: #f44336; font-weight: bold; }

        /* Board */
        .board-section {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 350px; /* Prevent layout shift during refresh */
        }
        .board-section img {
            max-width: 100%;
            border-radius: 8px;
        }

        /* Actions */
        .actions {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .actions h3 { margin-bottom: 15px; }
        .action-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #0f3460;
        }
        .action-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .action-group .btn { margin-right: 10px; margin-bottom: 10px; }
        .action-inputs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .action-inputs input, .action-inputs select {
            padding: 10px;
            font-size: 14px;
            border: 2px solid #0f3460;
            border-radius: 5px;
            background: #1a1a2e;
            color: #eee;
        }
        .action-inputs input:focus, .action-inputs select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }
        #toast.success { background: #4caf50; color: white; }
        #toast.error { background: #f44336; color: white; }

        /* Public Boards Grid */
        .public-boards-section {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .public-boards-section h2 {
            color: #00d9ff;
            margin-bottom: 15px;
        }
        .public-boards-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .public-board-item {
            flex: 0 0 auto;
            text-align: center;
            min-height: 380px; /* Prevent layout shift during refresh */
            padding: 10px;
        }
        .public-board-item p {
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        .public-board-item img {
            max-width: 250px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .public-board-item img:hover {
            transform: scale(1.05);
        }

        /* Modal for zoom */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 8px;
        }
        .modal p {
            color: #fff;
            margin-top: 15px;
            font-size: 18px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        /* Board Grid Styling */
        .board-grid {
            display: inline-grid;
            grid-template-columns: 30px repeat(10, 30px);
            grid-template-rows: 30px repeat(10, 30px);
            background: white;
            border: 2px solid #333;
            /* Fixed dimensions to prevent layout shifts */
            width: 332px;  /* 2px border + 12 header + 10*30 cells */
            height: 332px;
        }
        .board-cell {
            width: 30px;
            height: 30px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            transition: background-color 0.2s ease; /* Smooth transitions */
        }
        .board-cell.header {
            background: #e0e0e0;
            font-weight: bold;
            font-size: 12px;
            color: #333;
        }
        .board-cell.ship {
            /* background set inline by JS with team color */
        }
        .board-cell.ship.sunk {
            /* background set inline by JS with team color */
        }

        .board-replay-gif {
            width: 332px;
            height: 332px;
            border-radius: 4px;
        }

        /* Clickable cells on public boards */
        .public-board-item .board-cell { cursor: pointer; }
        .public-board-item .board-cell.header { cursor: default; }
        .public-board-item .board-cell:hover { background: rgba(0, 217, 255, 0.15); }

        /* Bomb Confirmation Modal */
        .bomb-confirm {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .bomb-confirm.active { display: flex; }
        .bomb-confirm-content {
            background: #16213e;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
        }
        .bomb-confirm-content p { font-size: 20px; margin-bottom: 10px; }
        .bomb-confirm-content .coord-display { font-size: 28px; color: #00d9ff; margin: 15px 0; }
        .bomb-confirm-actions { display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
        .bomb-confirm-actions .btn { font-size: 16px; padding: 12px 30px; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Team Header (name + status + stats + actions) -->
        <div class="team-header" id="team-header">
            <div class="team-info">
                <span class="team-color-dot" id="team-color-dot"></span>
                <span class="team-name" id="team-name">{{ tr.status.loading }}</span>
                <span class="team-status-badge waiting" id="game-status-badge">{{ tr.status.loading }}</span>
            </div>
            <div class="team-stats">
                <span>💣 <span id="bomb-count">-</span></span>
                <span>🚢 <span id="ship-count">-</span>/10</span>
                <span>💥 <span id="sunk-count">-</span> {{ tr.team.sunk }}</span>
            </div>
            <div class="team-actions">
                <button class="btn btn-primary btn-small" onclick="quickRedeem()">🔑 {{ tr.action.code.redeem }}</button>
                <select class="lang-select" id="lang-select" onchange="switchLanguage(this.value)">
                    <option value="en" {% if current_lang == 'en' %}selected{% endif %}>{{ tr.lang.en }}</option>
                    <option value="nl" {% if current_lang == 'nl' %}selected{% endif %}>{{ tr.lang.nl }}</option>
                </select>
            </div>
        </div>

        <!-- Public Boards -->
        <div class="public-boards-section">
            <h2>{{ tr.board.public.heading }}</h2>
            <div class="public-boards-grid" id="public-boards-grid">
                <!-- {{ tr.status.loading }} -->
            </div>
        </div>

        <!-- Actions -->
        <div class="actions" id="actions">
            {{ tr.action.loading }}
        </div>

        <!-- Private Board -->
        <div class="board-section">
            <h2>{{ tr.board.private.heading }}</h2>
            <div id="private-board"></div>
        </div>
    </div>

    <!-- Bomb Confirmation Modal -->
    <div id="bomb-confirm" class="bomb-confirm">
        <div class="bomb-confirm-content" id="bomb-confirm-content">
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Modal for zoom -->
    <div class="modal" id="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modal-img" src="" alt="">
        <p id="modal-caption"></p>
    </div>

    <script>
        const TEAM_COLOR = '{{ team_color }}';
        const TEAM_TOKEN = '{{ team_token }}';
        let gameStatus = 'waiting';
        const TEAM_COLORS_RGB = {
            'red': 'rgb(220, 60, 60)',
            'blue': 'rgb(60, 100, 220)',
            'green': 'rgb(60, 180, 80)',
            'purple': 'rgb(160, 60, 180)',
            'orange': 'rgb(255, 150, 50)',
            'yellow': 'rgb(220, 200, 60)'
        };
        const COLS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
        const TR = {{ tr_json|safe }};
        function getRgba(color, alpha) {
            var rgb = TEAM_COLORS_RGB[color];
            if (!rgb) return 'rgba(128,128,128,' + alpha + ')';
            return 'rgba(' + rgb.slice(4, -1) + ',' + alpha + ')';
        }
        function createCross(color) {
            var container = document.createElement('div');
            container.style.cssText = 'position:relative;width:22px;height:22px;';
            var line1 = document.createElement('div');
            line1.style.cssText = 'position:absolute;top:50%;left:50%;width:20px;height:3px;background:' + (TEAM_COLORS_RGB[color] || 'gray') + ';transform:translate(-50%,-50%) rotate(45deg);border-radius:1px;';
            container.appendChild(line1);
            var line2 = document.createElement('div');
            line2.style.cssText = 'position:absolute;top:50%;left:50%;width:20px;height:3px;background:' + (TEAM_COLORS_RGB[color] || 'gray') + ';transform:translate(-50%,-50%) rotate(-45deg);border-radius:1px;';
            container.appendChild(line2);
            return container;
        }
        function createDot(color) {
            var dot = document.createElement('div');
            dot.style.cssText = 'width:8px;height:8px;border-radius:50%;background:' + (TEAM_COLORS_RGB[color] || 'gray') + ';';
            return dot;
        }
        function _(key, params) {
            let val = TR;
            for (const part of key.split('.')) {
                val = val[part];
                if (val === undefined) return key;
            }
            if (typeof val !== 'string') return key;
            if (params) {
                for (const [k, v] of Object.entries(params)) {
                    val = val.replace('{' + k + '}', v);
                }
            }
            return val;
        }

        // Pending bomb state (set by clicking a public board cell)
        let pendingBombTarget = null;
        let pendingBombCoord = null;
        let winnerName = null;

        // Last rendered state for target team dropdown
        let lastTeamsData = null;

        // Cache for board grids to avoid rebuilding
        const boardGridCache = new Map();

        function renderGrid(containerId, gridData, includeShips, boardColor) {
            const container = document.getElementById(containerId);
            let grid = boardGridCache.get(containerId);
            if (!grid) {
                grid = document.createElement('div');
                grid.className = 'board-grid';
                const corner = document.createElement('div');
                corner.className = 'board-cell header';
                grid.appendChild(corner);
                for (let c = 0; c < 10; c++) {
                    const header = document.createElement('div');
                    header.className = 'board-cell header';
                    header.textContent = COLS[c];
                    grid.appendChild(header);
                }
                for (let r = 0; r < 10; r++) {
                    const rowHeader = document.createElement('div');
                    rowHeader.className = 'board-cell header';
                    rowHeader.textContent = r + 1;
                    grid.appendChild(rowHeader);
                    for (let c = 0; c < 10; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'board-cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        grid.appendChild(cell);
                    }
                }
                container.innerHTML = '';
                container.appendChild(grid);
                boardGridCache.set(containerId, grid);
            }

            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    const cellData = gridData[r][c] || {};
                    const cellIndex = 1 + 10 + r * 11 + 1 + c;
                    const cell = grid.children[cellIndex];
                    if (!cell) continue;

                    cell.className = 'board-cell';
                    cell.style.backgroundColor = '';
                    while (cell.firstChild) cell.removeChild(cell.firstChild);

                    const status = cellData.s;
                    const attackerColor = cellData.a || null;

                    if (includeShips && cellData.p) {
                        cell.classList.add('ship');
                        if (cellData.k) {
                            cell.classList.add('sunk');
                            cell.style.backgroundColor = getRgba(boardColor, 0.90);
                        } else {
                            cell.style.backgroundColor = getRgba(boardColor, 0.70);
                        }
                    } else if (status === 'h') {
                        cell.style.backgroundColor = getRgba(boardColor, 0.40);
                    }

                    if (status === 'h' && attackerColor) {
                        cell.appendChild(createCross(attackerColor));
                    } else if (status === 'm' && attackerColor) {
                        cell.appendChild(createDot(attackerColor));
                    }
                }
            }
        }

        async function apiCall(url, method = 'GET', body = null) {
            try {
                const sep = url.includes('?') ? '&' : '?';
                const options = { method };
                if (body) {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(body);
                }
                const resp = await fetch(url + sep + 'team_token=' + encodeURIComponent(TEAM_TOKEN), options);
                return await resp.json();
            } catch (error) {
                showToast(_('error.fetch_prefix') + error.message, 'error');
                return null;
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = type;
            toast.style.display = 'block';
            const duration = type === 'error' ? 5000 : 3000;
            setTimeout(() => toast.style.display = 'none', duration);
        }

        function updateBombCountDisplay(count) {
            const el = document.getElementById('bomb-count');
            el.textContent = count;
            el.className = count <= 0 ? 'bomb-count-empty' : count <= 2 ? 'bomb-count-low' : 'bomb-count-ok';
        }

        // Render everything from a single compact state object pushed via SSE
        function renderState(data) {
            var myTeam = data.t;
            var allTeams = data.ts;

            gameStatus = data.s;

            // Game status badge (inline in header)
            var badgeEl = document.getElementById('game-status-badge');
            if (data.s === 'started') {
                badgeEl.textContent = _('status.started');
                badgeEl.className = 'team-status-badge started';
            } else if (data.s === 'ended') {
                winnerName = data.w || null;
                badgeEl.textContent = winnerName ? _('status.ended') + ' 🏆 ' + winnerName : _('status.ended');
                badgeEl.className = 'team-status-badge ended';
            } else {
                badgeEl.textContent = _('status.waiting');
                badgeEl.className = 'team-status-badge waiting';
            }

            // Team header
            document.getElementById('team-color-dot').style.background = myTeam.c;
            document.getElementById('team-name').textContent = myTeam.n;
            updateBombCountDisplay(myTeam.b);
            document.getElementById('ship-count').textContent = myTeam.sp;
            document.getElementById('sunk-count').textContent = myTeam.sk;

            // Private board
            renderGrid('private-board', myTeam.g, true, TEAM_COLOR);

            // Public boards
            renderPublicBoards(allTeams);

            // Actions
            renderActions();
        }

        function renderPublicBoards(allTeams) {
            var grid = document.getElementById('public-boards-grid');
            var currentColors = new Set();

            allTeams.forEach(function (team) {
                if (team.c === TEAM_COLOR) return;
                currentColors.add(team.c);
                var boardId = 'public-board-' + team.c;
                var boardItem = document.getElementById('public-board-item-' + team.c);
                if (!boardItem) {
                    boardItem = document.createElement('div');
                    boardItem.className = 'public-board-item';
                    boardItem.id = 'public-board-item-' + team.c;
                    boardItem.style.backgroundColor = getRgba(team.c, 0.3);
                    boardItem.style.borderRadius = '8px';
                    boardItem.innerHTML =
                        '<p>' + _('board.public.team_label', {name: team.n, color: team.c}) + '</p>' +
                        '<div id="' + boardId + '"></div>';
                    grid.appendChild(boardItem);
                } else {
                    var nameEl = boardItem.querySelector('p');
                    var expected = _('board.public.team_label', {name: team.n, color: team.c});
                    if (nameEl && nameEl.textContent !== expected) nameEl.textContent = expected;
                    boardItem.style.backgroundColor = getRgba(team.c, 0.3);
                }

                if (gameStatus === 'ended') {
                    var boardDiv = document.getElementById(boardId);
                    var replayImg = document.getElementById('replay-gif-' + team.c);
                    if (!replayImg) {
                        boardDiv.innerHTML = '';
                        replayImg = document.createElement('img');
                        replayImg.id = 'replay-gif-' + team.c;
                        replayImg.className = 'board-replay-gif';
                        replayImg.src = '/api/board/' + team.c + '/replay.gif?team_token=' + TEAM_TOKEN;
                        replayImg.alt = _('board.public.replay_alt', {name: team.n});
                        boardDiv.appendChild(replayImg);
                    }
                } else {
                    renderGrid(boardId, team.g, false, team.c);
                }
            });

            // Remove stale boards
            for (var i = grid.children.length - 1; i >= 0; i--) {
                var child = grid.children[i];
                var match = child.id && child.id.match(/^public-board-item-(.+)$/);
                if (match && !currentColors.has(match[1])) {
                    grid.removeChild(child);
                    boardGridCache['delete']('public-board-' + match[1]);
                }
            }

            lastTeamsData = allTeams;
        }

        // Click-to-bomb: delegate clicks on public board cells
        document.getElementById('public-boards-grid').addEventListener('click', function (e) {
            var cell = e.target.closest('.board-cell');
            if (!cell) return;
            if (cell.classList.contains('header')) return;
            if (gameStatus === 'ended') {
                showToast(winnerName ? _('status.ended') + ' 🏆 ' + winnerName : _('status.ended'), 'error');
                return;
            }
            if (gameStatus !== 'started') {
                showToast(_('error.game_not_started'), 'error');
                return;
            }

            var boardItem = cell.closest('[id^="public-board-item-"]');
            if (!boardItem) return;

            var match = boardItem.id.match(/^public-board-item-(.+)$/);
            if (!match) return;
            if (match[1] === TEAM_COLOR) {
                showToast(_('error.cannot_bomb_self'), 'error');
                return;
            }

            pendingBombTarget = match[1];
            pendingBombCoord = COLS[parseInt(cell.dataset.col)] + (parseInt(cell.dataset.row) + 1);

            document.getElementById('bomb-confirm-content').innerHTML =
                '<p>' + _('bomb_confirm.title', {target: match[1]}) + '</p>' +
                '<div class="coord-display">' + pendingBombCoord + '</div>' +
                '<div class="bomb-confirm-actions">' +
                    '<button onclick="confirmBomb()" class="btn btn-primary">' + _('bomb_confirm.button') + '</button>' +
                    '<button onclick="closeBombConfirm()" class="btn btn-danger">' + _('bomb_confirm.cancel') + '</button>' +
                '</div>';
            document.getElementById('bomb-confirm').classList.add('active');
        });

        function showModal(imgEl, caption) {
            var modal = document.getElementById('modal');
            var modalImg = document.getElementById('modal-img');
            var modalCaption = document.getElementById('modal-caption');
            modalImg.src = imgEl.src;
            modalCaption.textContent = caption;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function renderActions() {
            var actionsEl = document.getElementById('actions');

            if (gameStatus === 'ended') {
                actionsEl.innerHTML = '<p>' + _('action.game_ended') + '</p>';
                return;
            }

            var html = '';

            if (gameStatus === 'waiting') {
                html +=
                    '<div class="action-group">' +
                        '<h3>' + _('action.ship.heading') + '</h3>' +
                        '<button class="btn btn-primary" onclick="placeAllShips()">' + _('action.ship.auto') + '</button>' +
                        '<div class="action-inputs">' +
                            '<input type="text" id="coord-input" placeholder="' + _('action.ship.coord_placeholder') + '">' +
                            '<select id="ship-type">' +
                                '<option value="airplane_carrier">' + _('action.ship.type_airplane') + '</option>' +
                                '<option value="battleship">' + _('action.ship.type_battleship') + '</option>' +
                                '<option value="torpedo_hunter">' + _('action.ship.type_torpedo') + '</option>' +
                                '<option value="patrol_boat">' + _('action.ship.type_patrol') + '</option>' +
                            '</select>' +
                            '<select id="direction">' +
                                '<option value="horizontal">' + _('action.ship.dir_horizontal') + '</option>' +
                                '<option value="vertical">' + _('action.ship.dir_vertical') + '</option>' +
                            '</select>' +
                            '<button class="btn btn-primary" onclick="placeShip()">' + _('action.ship.place') + '</button>' +
                        '</div>' +
                        '<div class="action-inputs">' +
                            '<input type="text" id="remove-coord" placeholder="' + _('action.ship.remove_placeholder') + '">' +
                            '<button class="btn btn-danger" onclick="removeShip()">' + _('action.ship.remove') + '</button>' +
                        '</div>' +
                    '</div>';
            }

            if (gameStatus === 'started') {
                html +=
                    '<div class="action-group">' +
                        '<h3>' + _('action.bomb.heading') + '</h3>' +
                        '<div class="action-inputs">' +
                            '<select id="target-team">' +
                                '<option value="">' + _('action.bomb.select_target') + '</option>' +
                            '</select>' +
                            '<input type="text" id="bomb-coord" placeholder="' + _('action.bomb.coord_placeholder') + '" onkeypress="if(event.key===\'Enter\')throwBomb()">' +
                            '<button class="btn btn-primary" onclick="throwBomb()">' + _('action.bomb.throw') + '</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="action-group">' +
                        '<h3>' + _('action.code.heading') + '</h3>' +
                        '<div class="action-inputs">' +
                            '<input type="number" id="code-loc" placeholder="' + _('action.code.location_placeholder') + '" onkeypress="if(event.key===\'Enter\')redeemCode()">' +
                            '<input type="text" id="code-val" placeholder="' + _('action.code.value_placeholder') + '" onkeypress="if(event.key===\'Enter\')redeemCode()">' +
                            '<button class="btn btn-primary" onclick="redeemCode()">' + _('action.code.redeem') + '</button>' +
                        '</div>' +
                    '</div>';
            }

            actionsEl.innerHTML = html;

            if (gameStatus === 'started' && lastTeamsData) {
                renderTargetTeams(lastTeamsData);
            }
        }

        function renderTargetTeams(allTeams) {
            var select = document.getElementById('target-team');
            if (!select) return;
            select.innerHTML = '<option value="">' + _('action.bomb.select_target') + '</option>';
            allTeams.forEach(function (team) {
                if (team.c !== TEAM_COLOR) {
                    var opt = document.createElement('option');
                    opt.value = team.c;
                    opt.textContent = _('action.bomb.team_option', {name: team.n, color: team.c});
                    select.appendChild(opt);
                }
            });
        }

        async function placeAllShips() {
            var result = await apiCall('/api/quick/place_all_ships', 'POST', { team_color: TEAM_COLOR });
            showToast(result.message, result.success ? 'success' : 'error');
        }

        async function placeShip() {
            var coord = document.getElementById('coord-input').value || 'A1';
            var shipType = document.getElementById('ship-type').value;
            var direction = document.getElementById('direction').value;
            var result = await apiCall('/api/execute', 'POST', {
                team_color: TEAM_COLOR,
                command: 'place',
                args: { ship_type: shipType, coordinate: coord, direction: direction }
            });
            showToast(result.message, result.success ? 'success' : 'error');
        }

        async function removeShip() {
            var coord = document.getElementById('remove-coord').value;
            if (!coord) { showToast(_('error.enter_coord'), 'error'); return; }

            var coordUpper = coord.toUpperCase().trim();
            var col = coordUpper.charCodeAt(0) - 65;
            var row = parseInt(coordUpper.substring(1)) - 1;

            if (col < 0 || col > 9 || row < 0 || row > 9) {
                showToast(_('error.invalid_coord'), 'error');
                return;
            }

            var result = await apiCall('/api/quick/remove_ship', 'POST', {
                team_color: TEAM_COLOR, row: row, col: col
            });
            showToast(result.message, result.success ? 'success' : 'error');
        }

        async function throwBomb() {
            var target = document.getElementById('target-team').value;
            var coord = document.getElementById('bomb-coord').value;

            if (!target) { showToast(_('error.select_target'), 'error'); return; }
            if (!coord) { showToast(_('error.enter_coord'), 'error'); return; }

            var result = await apiCall('/api/execute', 'POST', {
                team_color: TEAM_COLOR,
                command: 'bomb',
                args: { target: target, coordinate: coord }
            });
            showToast(result.message, result.success ? 'success' : 'error');
        }

        async function confirmBomb() {
            document.getElementById('bomb-confirm').classList.remove('active');
            if (!pendingBombTarget || !pendingBombCoord) return;

            var target = pendingBombTarget;
            var coord = pendingBombCoord;
            pendingBombTarget = null;
            pendingBombCoord = null;

            var result = await apiCall('/api/execute', 'POST', {
                team_color: TEAM_COLOR,
                command: 'bomb',
                args: { target: target, coordinate: coord }
            });
            showToast(result.message, result.success ? 'success' : 'error');
        }

        function closeBombConfirm() {
            document.getElementById('bomb-confirm').classList.remove('active');
            pendingBombTarget = null;
            pendingBombCoord = null;
        }

        async function redeemCode() {
            var locNum = document.getElementById('code-loc').value;
            var code = document.getElementById('code-val').value;

            if (!locNum) { showToast(_('error.enter_location'), 'error'); return; }
            if (!code) { showToast(_('error.enter_code'), 'error'); return; }

            var result = await apiCall('/api/execute', 'POST', {
                team_color: TEAM_COLOR,
                command: 'code',
                args: { location_number: parseInt(locNum), code: code }
            });
            showToast(result.message, result.success ? 'success' : 'error');
        }

        function switchLanguage(lang) {
            window.location.href = window.location.pathname + '?lang=' + lang;
        }

        function quickRedeem() {
            var actionsEl = document.getElementById('actions');
            if (actionsEl) actionsEl.scrollIntoView({ behavior: 'smooth' });
            var codeLoc = document.getElementById('code-loc');
            if (codeLoc) setTimeout(function () { codeLoc.focus(); }, 400);
        }

        // SSE: pushes state updates when events occur
        var currentES = null;
        function connectSSE() {
            if (currentES) currentES.close();
            var es = new EventSource('/api/events/stream?team_token=' + encodeURIComponent(TEAM_TOKEN));
            currentES = es;
            es.onmessage = function (event) {
                var data = JSON.parse(event.data);
                if (data.error) {
                    document.getElementById('team-header').innerHTML =
                        '<div class="team-info">' +
                            '<span class="team-color-dot" style="background:' + TEAM_COLOR + '"></span>' +
                            '<span class="team-name">' + _('team.not_joined', {color: TEAM_COLOR}) + '</span>' +
                            '<span class="team-status-badge waiting">' + _('status.waiting') + '</span>' +
                        '</div>';
                    return;
                }
                renderState(data);
            };
            es.onerror = function () {
                es.close();
                setTimeout(connectSSE, 5000);
            };
        }

        // Fetch initial state directly (so page renders even without SSE)
        apiCall('/api/team-state').then(function (data) {
            if (data && !data.error) {
                renderState(data);
            } else {
                document.getElementById('team-header').innerHTML =
                    '<div class="team-info">' +
                        '<span class="team-color-dot" style="background:' + TEAM_COLOR + '"></span>' +
                        '<span class="team-name">' + _('team.not_joined', {color: TEAM_COLOR}) + '</span>' +
                        '<span class="team-status-badge waiting">' + _('status.waiting') + '</span>' +
                    '</div>';
            }
        });

        // SSE for subsequent updates
        connectSSE();

        // Fallback: reconnect SSE if it ever silently dies
        setInterval(function () {
            if (currentES && currentES.readyState === EventSource.CLOSED) {
                connectSSE();
            }
        }, 30000);
    </script>
</body>
</html>
