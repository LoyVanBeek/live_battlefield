<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Battlefield - Super Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { text-align: center; margin-bottom: 20px; color: #00d9ff; }
        .container { max-width: 800px; margin: 0 auto; }
        .section {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #00d9ff; color: #1a1a2e; }
        .btn-primary:hover { background: #00b8d4; }
        .btn-success { background: #4caf50; color: white; }
        .btn-success:hover { background: #45a049; }
        input, select {
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #eee;
            width: 100%;
        }
        input:focus { outline: none; border-color: #00d9ff; }
        .game-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #0f3460;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .game-row .name { font-size: 16px; font-weight: bold; }
        .game-row .status { font-size: 13px; }
        .game-row .status.waiting { color: #ff9800; }
        .game-row .status.started { color: #4caf50; }
        .game-row .status.ended { color: #f44336; }
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 15px 25px; border-radius: 8px;
            font-weight: bold; display: none; z-index: 1000;
        }
        .toast.success { background: #4caf50; color: white; }
        .toast.error { background: #f44336; color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Super Admin</h1>

        <div class="section">
            <h2>Create New Game</h2>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="text" id="game-name" placeholder="Game name (optional)" style="flex: 1;">
                <button class="btn btn-success" onclick="createGame()">Create Game</button>
            </div>
        </div>

        <div class="section" id="games-section">
            <h2>Games</h2>
            <div id="games-list">
                <p style="color: #888;">Loading...</p>
            </div>
        </div>

        <div class="section">
            <h2>Super Admin Token</h2>
            <p style="color: #888; margin-bottom: 10px;">Use this to log in at /admin</p>
            <input type="text" id="sa-token" readonly style="background: #0f3460; cursor: text;">
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function getToken() {
            return window.location.pathname.replace('/admin/', '');
        }

        async function apiCall(url, method, body) {
            try {
                const sep = url.includes('?') ? '&' : '?';
                const res = await fetch(url + sep + 'token=' + getToken(), {
                    method: method || 'GET',
                    headers: body ? {'Content-Type': 'application/json'} : {},
                    body: body ? JSON.stringify(body) : undefined
                });
                if (!res.ok) throw new Error(await res.text());
                return await res.json();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
                return null;
            }
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function loadSuperToken() {
            const path = window.location.pathname;
            const token = path.replace('/admin/', '');
            document.getElementById('sa-token').value = token;
        }

        async function loadGames() {
            const data = await apiCall('/api/admin/games');
            if (!data) return;

            const list = document.getElementById('games-list');
            if (data.games.length === 0) {
                list.innerHTML = '<p style="color: #888;">No games yet. Create one above.</p>';
                return;
            }
            list.innerHTML = data.games.map(g => {
                const statusClass = g.status === 'started' ? 'started' : g.status === 'ended' ? 'ended' : 'waiting';
                const statusLabel = g.status === 'started' ? '🎮 Started' : g.status === 'ended' ? '🏁 Ended' : '⏳ Waiting';
                const gmUrl = window.location.origin + '/game-master/' + g.gm_token;
                return '<div class="game-row">' +
                    '<div><div class="name">' + (g.name || 'Game ' + g.id.slice(0, 8)) + '</div>' +
                    '<div class="status ' + statusClass + '">' + statusLabel + ' — ' + g.team_count + ' teams, ' + g.location_count + ' locations</div></div>' +
                    '<div style="display:flex;flex-direction:column;gap:5px;align-items:end;">' +
                    '<button class="btn btn-primary" onclick="copyText(\'' + gmUrl + '\')">📋 Copy GM URL</button>' +
                    '<a href="' + gmUrl + '" target="_blank" style="color:#00d9ff;font-size:12px;">Open GM page →</a>' +
                    '</div></div>';
            }).join('');
        }

        async function createGame() {
            const name = document.getElementById('game-name').value.trim() || null;
            const data = await apiCall('/api/admin/games', 'POST', { name: name });
            if (data) {
                showToast('Game created!', 'success');
                document.getElementById('game-name').value = '';
                const gmUrl = window.location.origin + '/game-master/' + data.gm_token;
                copyText(gmUrl);
                loadGames();
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied: ' + text, 'success');
            }).catch(() => {
                showToast('Failed to copy', 'error');
            });
        }

        loadSuperToken();
        loadGames();
    </script>
</body>
</html>
