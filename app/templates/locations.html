<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations Overview - Live Battlefield</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00d9ff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .table-container {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        th {
            background: #0f3460;
            color: #00d9ff;
            font-weight: bold;
        }
        tr:hover {
            background: #1f2f50;
        }
        .code {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #ff9800;
        }
        .coords {
            font-family: monospace;
            color: #888;
        }
        .visited {
            color: #4caf50;
        }
        .not-visited {
            color: #666;
            font-style: italic;
        }
        .map-link {
            display: inline-block;
            padding: 6px 12px;
            background: #00d9ff;
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .map-link:hover {
            background: #00b8d4;
        }
        .nav-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #0f3460;
            color: #00d9ff;
            text-decoration: none;
            border-radius: 5px;
        }
        .nav-link:hover {
            background: #1a4a7a;
        }
        .color-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin: 2px;
        }
        .color-red { background: #dc3c3c; }
        .color-blue { background: #3c64dc; }
        .color-green { background: #3cdc3c; }
        .color-purple { background: #a03cdc; }
        .color-orange { background: #ff9800; }
        .color-yellow { background: #dcdc3c; color: #000; }
        .btn-remove {
            background: #dc3c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-remove:hover {
            background: #c42c2c;
        }
        .btn-add {
            background: #4caf50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        .btn-add:hover {
            background: #45a049;
        }
        .location-form {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .location-form input {
            padding: 8px;
            font-size: 14px;
            border: 2px solid #0f3460;
            border-radius: 5px;
            background: #1a1a2e;
            color: #eee;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .location-form input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        #map {
            height: 400px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #0f3460;
        }
        .leaflet-popup-content-wrapper {
            background: #16213e;
            color: #eee;
        }
        .leaflet-popup-tip {
            background: #16213e;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin" class="nav-link">← Back to Admin Panel</a>
        
        <h1>📍 Locations Overview (Secret)</h1>
        
        <!-- Add Location Form -->
        <div class="location-form">
            <h3 style="margin-bottom: 10px; color: #00d9ff;">➕ Add Locations</h3>
            <div class="form-row">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 12px; color: #888;">Latitude</label>
                    <input type="number" id="loc-lat" placeholder="52.52" step="0.0001" style="width: 120px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 12px; color: #888;">Longitude</label>
                    <input type="number" id="loc-lon" placeholder="13.405" step="0.0001" style="width: 120px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 12px; color: #888;">Count</label>
                    <input type="number" id="loc-count" placeholder="Count" value="1" min="1" max="100" style="width: 80px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 12px; color: #888;">Radius (km)</label>
                    <input type="number" id="loc-radius" placeholder="Radius" value="2" step="0.1" style="width: 100px;">
                </div>
                <button class="btn-add" onclick="addLocations()" style="margin-top: 18px;">Add</button>
            </div>
            <p style="color: #888; font-size: 12px; margin-top: 5px;">Leave count=1 for single location, or set higher for random batch. Or click on the map below to pick a location.</p>
        </div>
        
        <!-- Map -->
        <div style="position: relative;">
            <div id="map"></div>
            <div style="position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(22, 33, 62, 0.9); padding: 8px 12px; border-radius: 4px; font-size: 12px; color: #00d9ff;">
                🖱️ Click map to add location
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Location #</th>
                        <th>Code</th>
                        <th>Coordinates</th>
                        <th>Bombs</th>
                        <th>Visited By</th>
                        <th>Map</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="locations-body">
                    <tr>
                        <td colspan="7" style="text-align: center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let map;
        let markers = [];
        const BOXTEL_CENTER = [51.59, 5.33];
        
        const colorClasses = {
            'red': 'color-red',
            'blue': 'color-blue',
            'green': 'color-green',
            'purple': 'color-purple',
            'orange': 'color-orange',
            'yellow': 'color-yellow'
        };

        function getColorClass(color) {
            return colorClasses[color] || 'color-red';
        }

        function initMap() {
            map = L.map('map').setView(BOXTEL_CENTER, 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            
            map.on('click', async function(e) {
                try {
                    const resp = await fetch('/api/quick/create_locations', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            latitude: e.latlng.lat,
                            longitude: e.latlng.lng,
                            count: 1,
                            radius_km: 0
                        })
                    });
                    const data = await resp.json();
                    
                    if (data.success && data.locations && data.locations.length > 0) {
                        const loc = data.locations[0];
                        const marker = L.marker([e.latlng.lat, e.latlng.lng])
                            .addTo(map)
                            .bindPopup(`<b>Location ${loc.number}</b><br>Code: ${loc.code}<br>Bombs: ${loc.bomb_value || 1}`)
                            .openPopup();
                        markers.push(marker);
                        loadLocations();
                    } else {
                        alert(data.message || 'Error adding location');
                    }
                } catch (err) {
                    console.error('Error adding location:', err);
                    alert('Error adding location');
                }
            });
        }

        function updateMarkers(locations) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            locations.forEach(loc => {
                const marker = L.marker([loc.latitude, loc.longitude])
                    .addTo(map)
                    .bindPopup(`<b>Location ${loc.number}</b><br>Code: ${loc.code}<br>Bombs: ${loc.bomb_value || 1}`);
                markers.push(marker);
            });
        }

        async function loadLocations() {
            if (!map) {
                initMap();
            }
            
            try {
                const resp = await fetch('/api/admin/locations');
                const data = await resp.json();
                
                const tbody = document.getElementById('locations-body');
                
                if (data.locations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No locations found</td></tr>';
                    return;
                }
                
                updateMarkers(data.locations);
                
                tbody.innerHTML = data.locations.map(loc => {
                    const lat = loc.latitude.toFixed(4);
                    const lon = loc.longitude.toFixed(4);
                    const mapUrl = `https://maps.google.com/?q=${loc.latitude},${loc.longitude}`;
                    
                    let visitedHtml;
                    if (loc.visited_by && loc.visited_by.length > 0) {
                        visitedHtml = loc.visited_by.map(team => 
                            `<span class="color-badge ${getColorClass(team)}">${team}</span>`
                        ).join(' ');
                    } else {
                        visitedHtml = '<span class="not-visited">(none yet)</span>';
                    }
                    
                    return `
                        <tr>
                            <td>${loc.number}</td>
                            <td class="code">${loc.code}</td>
                            <td class="coords">${lat}, ${lon}</td>
                            <td>💣 ${loc.bomb_value || 1}</td>
                            <td class="visited">${visitedHtml}</td>
                            <td><a href="${mapUrl}" target="_blank" class="map-link">Map</a></td>
                            <td><button class="btn-remove" onclick="removeLocation(${loc.number}, '${loc.code}')">Remove</button></td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error('Error loading locations:', e);
                document.getElementById('locations-body').innerHTML = 
                    '<tr><td colspan="7" style="text-align: center; color: #f44336;">Error loading locations</td></tr>';
            }
        }

        async function removeLocation(locationNumber, code) {
            if (!confirm(`Remove location ${locationNumber} (code: ${code})?`)) {
                return;
            }
            
            try {
                const resp = await fetch('/api/quick/remove_location', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location_number: locationNumber })
                });
                const data = await resp.json();
                
                if (data.success) {
                    alert(data.message);
                    loadLocations();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (e) {
                console.error('Error removing location:', e);
                alert('Error removing location');
            }
        }

        async function addLocations() {
            const lat = parseFloat(document.getElementById('loc-lat').value);
            const lon = parseFloat(document.getElementById('loc-lon').value);
            const count = parseInt(document.getElementById('loc-count').value) || 1;
            const radius = parseFloat(document.getElementById('loc-radius').value) || 2;
            
            if (isNaN(lat) || isNaN(lon)) {
                alert('Please enter latitude and longitude!');
                return;
            }
            
            if (!confirm(`Create ${count} location(s) at (${lat}, ${lon})?`)) {
                return;
            }
            
            try {
                const resp = await fetch('/api/quick/create_locations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        latitude: lat,
                        longitude: lon,
                        count: count,
                        radius_km: radius
                    })
                });
                const data = await resp.json();
                
                if (data.success) {
                    alert(data.message);
                    loadLocations();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (e) {
                console.error('Error adding locations:', e);
                alert('Error adding locations');
            }
        }

        loadLocations();
    </script>
</body>
</html>
