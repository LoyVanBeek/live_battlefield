<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations Overview - Live Battlefield</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00d9ff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .table-container {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        th {
            background: #0f3460;
            color: #00d9ff;
            font-weight: bold;
        }
        tr:hover {
            background: #1f2f50;
        }
        .code {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #ff9800;
        }
        .coords {
            font-family: monospace;
            color: #888;
        }
        .visited {
            color: #4caf50;
        }
        .not-visited {
            color: #666;
            font-style: italic;
        }
        .map-link {
            display: inline-block;
            padding: 6px 12px;
            background: #00d9ff;
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .map-link:hover {
            background: #00b8d4;
        }
        .nav-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #0f3460;
            color: #00d9ff;
            text-decoration: none;
            border-radius: 5px;
        }
        .nav-link:hover {
            background: #1a4a7a;
        }
        .color-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin: 2px;
        }
        .color-red { background: #dc3c3c; }
        .color-blue { background: #3c64dc; }
        .color-green { background: #3cdc3c; }
        .color-purple { background: #a03cdc; }
        .color-orange { background: #ff9800; }
        .color-yellow { background: #dcdc3c; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin" class="nav-link">← Back to Admin Panel</a>
        
        <h1>📍 Locations Overview (Secret)</h1>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Location #</th>
                        <th>Code</th>
                        <th>Coordinates</th>
                        <th>Visited By</th>
                        <th>Map</th>
                    </tr>
                </thead>
                <tbody id="locations-body">
                    <tr>
                        <td colspan="5" style="text-align: center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const colorClasses = {
            'red': 'color-red',
            'blue': 'color-blue',
            'green': 'color-green',
            'purple': 'color-purple',
            'orange': 'color-orange',
            'yellow': 'color-yellow'
        };

        function getColorClass(color) {
            return colorClasses[color] || 'color-red';
        }

        async function loadLocations() {
            try {
                const resp = await fetch('/api/admin/locations');
                const data = await resp.json();
                
                const tbody = document.getElementById('locations-body');
                
                if (data.locations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No locations found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.locations.map(loc => {
                    const lat = loc.latitude.toFixed(4);
                    const lon = loc.longitude.toFixed(4);
                    const mapUrl = `https://maps.google.com/?q=${loc.latitude},${loc.longitude}`;
                    
                    let visitedHtml;
                    if (loc.visited_by && loc.visited_by.length > 0) {
                        visitedHtml = loc.visited_by.map(team => 
                            `<span class="color-badge ${getColorClass(team)}">${team}</span>`
                        ).join(' ');
                    } else {
                        visitedHtml = '<span class="not-visited">(none yet)</span>';
                    }
                    
                    return `
                        <tr>
                            <td>${loc.number}</td>
                            <td class="code">${loc.code}</td>
                            <td class="coords">${lat}, ${lon}</td>
                            <td class="visited">${visitedHtml}</td>
                            <td><a href="${mapUrl}" target="_blank" class="map-link">Map</a></td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error('Error loading locations:', e);
                document.getElementById('locations-body').innerHTML = 
                    '<tr><td colspan="5" style="text-align: center; color: #f44336;">Error loading locations</td></tr>';
            }
        }

        loadLocations();
    </script>
</body>
</html>
