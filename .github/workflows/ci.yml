name: CI

on:
  push:
    branches: [main, master, feature/*]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-sync: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run type checks
        run: uv run ty check

      - name: Run tests
        run: uv run pytest tests/

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build base image
        run: docker compose build app

      - name: Start test infrastructure
        run: touch .env && docker compose up -d test-postgres test-app

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/admin/create-game?token=e2e-test-admin -X POST > /dev/null 2>&1; then
              echo "App ready"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          docker compose logs test-app
          exit 1

      - name: Run e2e tests
        run: docker compose run --rm test-e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: test-results/

      - name: Clean up
        if: always()
        run: touch .env && docker compose down -v
